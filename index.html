<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Varun Teja | Marketing Strategist</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
overflow-x:hidden;
}

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
position:relative;
overflow:hidden;
}

.hero::before{
content:"";
position:absolute;
width:800px;
height:800px;
background:linear-gradient(45deg,#00f5ff,#7c3aed);
border-radius:50%;
filter:blur(180px);
animation:move 10s infinite alternate;
opacity:.5;
}

@keyframes move{
0%{
transform:translate(-200px,-150px);
}
100%{
transform:translate(200px,150px);
}
}

.content{
position:relative;
z-index:2;
}

.content h1{
font-size:4rem;
font-weight:700;
margin-bottom:10px;
}

.highlight{
background:linear-gradient(90deg,#00f5ff,#7c3aed);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.typing{
font-size:1.5rem;
margin-bottom:25px;
color:#cbd5e1;
}

.btns{
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}

.btn{
padding:14px 32px;
border:none;
border-radius:50px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.4s;
text-decoration:none;
}

.primary{
background:linear-gradient(90deg,#00f5ff,#7c3aed);
color:white;
}

.primary:hover{
transform:translateY(-5px);
box-shadow:0 15px 35px rgba(124,58,237,.4);
}

.secondary{
border:2px solid #00f5ff;
color:#00f5ff;
background:transparent;
}

.secondary:hover{
background:#00f5ff;
color:#0f172a;
}

.stats{
display:flex;
justify-content:center;
gap:50px;
margin-top:50px;
flex-wrap:wrap;
}

.card{
background:rgba(255,255,255,.05);
padding:25px;
border-radius:15px;
backdrop-filter:blur(10px);
transition:.4s;
min-width:180px;
}

.card:hover{
transform:translateY(-10px);
}

.card h2{
font-size:2rem;
color:#00f5ff;
}

.card p{
color:#cbd5e1;
}

@media(max-width:768px){
.content h1{
font-size:2.5rem;
}
.typing{
font-size:1.1rem;
}
}

</style>
</head>

<body>

<section class="hero">

<div class="content">

<h1>Hi, I'm <span class="highlight">Varun Teja</span></h1>

<p class="typing">
Marketing Strategist • Agency Leader • Performance Ads Expert
</p>

<div class="btns">
<a href="#contact" class="btn primary">Hire Me</a>
<a href="#projects" class="btn secondary">View Work</a>
</div>

<div class="stats">

<div class="card">
<h2>3+</h2>
<p>Years Leadership</p>
</div>

<div class="card">
<h2>50+</h2>
<p>Campaigns Managed</p>
</div>

<div class="card">
<h2>100%</h2>
<p>Client Focused</p>
</div>

</div>

</div>

</section>

</body>
</html>
